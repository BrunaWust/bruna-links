<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruna Gabriele Wüst</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --paper: #E7E3D6;
    --paper-2: #DCD7C7;
    --ink: #202A22;
    --ink-soft: #4A5548;
    --teal: #3F7268;
    --rust: #8C3B2E;
    --line: #B7B29F;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; min-height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* trilha de contorno topográfico de fundo */
  .contours{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    opacity:0.35;
  }

  /* linha de varredura, uma referência sutil a sensoriamento remoto */
  .scanline{
    position:fixed; left:0; right:0; height:2px; z-index:1;
    background:linear-gradient(90deg, transparent, var(--teal) 40%, var(--teal) 60%, transparent);
    opacity:0.35;
    animation:scan 7s linear infinite;
    pointer-events:none;
  }
  @keyframes scan{
    0%{ top:-2px; }
    100%{ top:100%; }
  }
  @media (prefers-reduced-motion: reduce){
    .scanline{ animation:none; display:none; }
  }

  .wrap{
    position:relative; z-index:2;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:32px 20px;
  }

  .card{
    width:100%; max-width:420px;
  }

  .coords{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    text-transform:uppercase;
    text-align:center;
    margin-bottom:22px;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .coords::before, .coords::after{
    content:"";
    height:1px; width:28px;
    background:var(--line);
  }

  .name{
    font-family:'Bitter', serif;
    font-weight:700;
    font-size:clamp(28px, 7vw, 38px);
    line-height:1.15;
    text-align:center;
    margin:0 0 8px;
    color:var(--ink);
  }

  .role{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    letter-spacing:0.04em;
    text-align:center;
    color:var(--teal);
    margin:0 0 40px;
  }

  .legend-title{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 14px 4px;
  }

  .links{
    list-style:none; margin:0 0 36px; padding:0;
    display:flex; flex-direction:column; gap:12px;
  }

  .links a{
    display:flex; align-items:center; gap:14px;
    padding:16px 18px;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:3px;
    text-decoration:none;
    color:var(--ink);
    position:relative;
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
  }
  .links a:hover, .links a:focus-visible{
    transform:translateX(4px);
    border-color:var(--teal);
    background:#fff;
    outline:none;
  }
  .links a:active{ transform:translateX(4px) scale(0.99); }

  .marker{
    flex:0 0 auto;
    width:30px; height:30px;
    display:flex; align-items:center; justify-content:center;
    color:var(--ink);
  }
  .links a:hover .marker{ color:var(--rust); }

  .link-text{ flex:1; min-width:0; }
  .link-label{
    font-family:'Bitter', serif;
    font-weight:600;
    font-size:15.5px;
    display:block;
  }
  .link-sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    display:block;
    margin-top:2px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  .arrow{
    font-family:'IBM Plex Mono', monospace;
    color:var(--ink-soft);
    flex:0 0 auto;
  }

  footer{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    letter-spacing:0.06em;
  }
  footer .div{
    width:36px; height:1px; background:var(--line);
    margin:0 auto 14px;
  }
</style>
</head>
